name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 24]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
      - name: testes
        run: npm test
      - name: render demo (stdin)
        shell: bash
        run: echo '{"model":{"display_name":"Opus"},"effort":{"level":"high"},"context_window":{"used_percentage":92,"total_input_tokens":184000}}' | node bin/moodline.js render

  coverage:
    name: coverage gate (linhas/funcs ≥ 90%, branches ≥ 80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: npm run coverage

  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    # Requer o secret SONAR_TOKEN e a "Automatic Analysis" DESLIGADA no SonarCloud
    # (Administration → Analysis Method). Sem o secret, o passo de scan e pulado (job verde).
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: https://sonarcloud.io
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # o Sonar precisa do historico completo (blame/novos issues)
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - name: cobertura (lcov pro Sonar)
        run: npm run coverage:lcov
      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v5
